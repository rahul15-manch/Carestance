{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div
    class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-indigo-100 via-white to-violet-100">

    <!-- Background Glow Effects -->
    <div
        class="absolute -top-32 -left-32 w-96 h-96 bg-violet-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse">
    </div>
    <div
        class="absolute -bottom-32 -right-32 w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse">
    </div>

    <div class="relative max-w-md w-full px-6">
        <div class="bg-white/70 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/40">

            <!-- Header -->
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    Reset Password
                </h2>
                <p class="text-sm text-slate-500">
                    Enter your email to receive a secure reset link.
                </p>
            </div>

            {% if error %}
            <div
                class="mt-4 p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-sm font-medium flex items-center gap-3">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            {% if message %}
            <div
                class="mt-4 p-4 bg-emerald-50 border border-emerald-100 text-emerald-600 rounded-xl text-sm font-medium flex items-center gap-3">
                <i class="fas fa-check-circle"></i>
                {{ message }}
            </div>
            {% endif %}

            <!-- Form -->
            <form class="mt-8 space-y-6" action="/forgot-password" method="POST">
                <div class="relative">
                    <input id="email-address" name="email" type="email" required
                        class="peer w-full px-4 pt-5 pb-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition"
                        placeholder=" ">
                    <label for="email-address"
                        class="absolute left-4 top-2 text-xs text-slate-500 peer-placeholder-shown:text-sm peer-placeholder-shown:top-4 peer-placeholder-shown:text-slate-400 transition-all">
                        Email Address
                    </label>
                </div>

                <button type="submit"
                    class="w-full py-3 rounded-xl text-white font-bold bg-gradient-to-r from-violet-600 to-indigo-600 hover:scale-[1.03] hover:shadow-xl transition-all duration-300">
                    Send Reset Link
                </button>

                <div class="text-center">
                    <a href="/login" class="text-sm font-medium text-slate-500 hover:text-violet-600 transition">
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
