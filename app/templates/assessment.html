{% extends "base.html" %}

{% block title %}Assessment{% endblock %}

{% block content %}
<!-- Premium Fonts and Icons -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
    :root {
        --dark-bg: #070e0f;
        --dark-card: rgba(13, 29, 31, 0.7);
        --neon-cyan: #00f2ff;
        --neon-purple: #8b5cff;
        --glow-cyan: rgba(0, 242, 255, 0.25);
        --glow-purple: rgba(139, 92, 255, 0.25);
        --text-bright: #e4f7f8;
        --text-dim: #7f999c;
        --border-neon: rgba(0, 242, 255, 0.15);
        --border-purple: rgba(139, 92, 255, 0.15);
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    body {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        background: linear-gradient(135deg, #050d0e 0%, #030606 100%) !important;
        color: var(--text-bright);
    }

    /* Outer Glowing Backgrounds */
    .cyber-bg-glow {
        position: fixed;
        width: 40vw;
        height: 40vw;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow-purple) 0%, transparent 70%);
        filter: blur(120px);
        opacity: 0.25;
        z-index: 0;
        top: -10%;
        right: -10%;
        pointer-events: none;
    }

    .cyber-bg-glow-2 {
        position: fixed;
        width: 40vw;
        height: 40vw;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
        filter: blur(120px);
        opacity: 0.25;
        z-index: 0;
        bottom: -10%;
        left: -10%;
        pointer-events: none;
    }

    .premium-assessment-card {
        background: var(--dark-card);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 242, 255, 0.02) inset;
        border-radius: 28px;
        position: relative;
        overflow: hidden;
        z-index: 10;
        transition: all 0.4s ease;
    }

    /* Swipe Deck Structure */
    .deck-container {
        height: 380px;
        position: relative;
        perspective: 1000px;
        margin: 0 auto;
        width: 100%;
        max-width: 340px;
    }

    .swipe-card {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(18, 38, 41, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        cursor: grab;
        user-select: none;
        transform-origin: 50% 100%;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    }

    .swipe-card:nth-child(2) {
        transform: scale(0.95) translateY(18px);
        z-index: -1;
        opacity: 0.6;
        filter: blur(1px);
    }

    .swipe-card:nth-child(3) {
        transform: scale(0.9) translateY(36px);
        z-index: -2;
        opacity: 0.3;
        filter: blur(2px);
    }

    .swipe-card.swiping-right {
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.4) inset, 0 20px 40px rgba(0,0,0,0.6);
        border-color: var(--neon-cyan);
    }

    .swipe-card.swiping-left {
        box-shadow: 0 0 30px rgba(139, 92, 255, 0.4) inset, 0 20px 40px rgba(0,0,0,0.6);
        border-color: var(--neon-purple);
    }

    .swipe-card.swiped-right {
        transform: translate(180%, -20%) rotate(40deg) !important;
        opacity: 0;
        pointer-events: none;
    }

    .swipe-card.swiped-left {
        transform: translate(-180%, -20%) rotate(-40deg) !important;
        opacity: 0;
        pointer-events: none;
    }

    /* Conversational Chat System */
    .chat-container {
        height: 380px;
        overflow-y: auto;
        padding-right: 8px;
    }

    .chat-container::-webkit-scrollbar {
        width: 6px;
    }
    .chat-container::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 10px;
    }
    .chat-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
    }

    .chat-bubble {
        max-width: 85%;
        padding: 14px 20px;
        border-radius: 20px;
        line-height: 1.5;
        font-size: 0.95rem;
        animation: bubble-stagger 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        margin-bottom: 16px;
    }

    .chat-bubble.mentor {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-neon);
        color: var(--text-bright);
        border-bottom-left-radius: 4px;
        align-self: flex-start;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .chat-bubble.user {
        background: linear-gradient(135deg, var(--neon-purple), #6333cc);
        color: white;
        border-bottom-right-radius: 4px;
        align-self: flex-end;
        box-shadow: 0 8px 20px rgba(139, 92, 255, 0.15);
    }

    /* Fira Code Style for Console logs (Phase 0) */
    .console-bubble {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 0.85rem;
        background: rgba(0,0,0,0.4) !important;
        border: 1px solid var(--border-neon) !important;
        color: var(--neon-cyan) !important;
    }
    .console-bubble.user {
        border-color: var(--border-purple) !important;
        color: var(--neon-purple) !important;
        background: rgba(0,0,0,0.4) !important;
    }

    @keyframes bubble-stagger {
        from { opacity: 0; transform: translateY(14px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .typing-indicator-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 12px 18px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--glass-border);
        border-radius: 18px;
        align-self: flex-start;
        margin-bottom: 16px;
    }

    .typing-indicator-dots .dot {
        width: 6px;
        height: 6px;
        background-color: var(--text-dim);
        border-radius: 50%;
        animation: typing-wave 1.4s infinite ease-in-out both;
    }
    .typing-indicator-dots .dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator-dots .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing-wave {
        0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
    }

    /* Option buttons */
    .premium-option-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 16px 20px;
        color: var(--text-bright);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: left;
        cursor: pointer;
        outline: none;
    }

    .premium-option-btn:hover {
        background: rgba(0, 242, 255, 0.05);
        border-color: var(--neon-cyan);
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        transform: translateY(-2px);
    }

    .premium-option-btn.selected {
        background: linear-gradient(135deg, rgba(0, 242, 255, 0.15), rgba(139, 92, 255, 0.15));
        border-color: var(--neon-cyan);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        transform: scale(0.98);
    }

    /* Custom Cyber UI Elements */
    .cyber-badge {
        font-family: 'Outfit', sans-serif;
        letter-spacing: 2px;
        font-size: 0.7rem;
        background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), rgba(139, 92, 255, 0.1));
        border: 1px solid var(--border-neon);
        color: var(--neon-cyan);
        border-radius: 20px;
        padding: 4px 12px;
        text-transform: uppercase;
        display: inline-block;
        font-weight: 700;
    }

    /* Custom Progress bar */
    .cyber-progress-bg {
        height: 6px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .cyber-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
        box-shadow: 0 0 10px var(--neon-cyan);
        border-radius: 10px;
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Oblique trigger animations */
    .stagger-in {
        opacity: 0;
        transform: translateY(16px);
        animation: cyber-stagger 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes cyber-stagger {
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="cyber-bg-glow"></div>
<div class="cyber-bg-glow-2"></div>

<div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 relative z-10">
    <!-- Header Details -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-2" id="grade-title">
                Psychometric Assessment
            </h1>
            <p class="text-sm font-semibold tracking-wider text-teal-400 mt-1 uppercase" id="subtitle-tracker">
                Shadow Analysis Pipeline Activated
            </p>
        </div>
        <div class="flex flex-col items-end gap-1">
            <span class="text-xs font-bold uppercase tracking-widest text-[#7f999c]" id="phase-step-label">Phase 1 of 5</span>
            <div class="w-48 cyber-progress-bg mt-1">
                <div class="cyber-progress-fill" id="global-progress-fill" style="width: 20%;"></div>
            </div>
        </div>
    </div>

    <!-- Glowing Interactive Container Card -->
    <div class="premium-assessment-card p-8 sm:p-10 min-h-[520px] flex flex-col justify-between">
        
        <!-- Loading Shield overlay -->
        <div id="loader" class="absolute inset-0 bg-[#070e0f]/95 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
            <div class="relative flex items-center justify-center mb-6">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-cyan-400"></div>
                <div class="absolute h-10 w-10 rounded-full bg-[#122629] border border-cyan-400/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
            </div>
            <p class="text-cyan-400 font-extrabold text-sm tracking-widest uppercase animate-pulse" id="loader-text">Loading Node Matrix...</p>
        </div>

        <!-- Upper Section Workspace -->
        <div class="w-full" id="phase-body">
            <!-- Phase layouts render here dynamically -->
        </div>

        <!-- Footer / Panel Control Bar -->
        <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center w-full relative z-10">
            <a href="/assessment/reset" onclick="return confirm('WARNING: Re-initializing will wipe your current psychometric telemetry logs. Proceed?')" class="text-xs font-bold uppercase tracking-widest text-[#ff6161] hover:text-[#ff8282] transition-colors">
                Reset Engine
            </a>
            
            <div class="flex items-center gap-3">
                <button type="button" id="speak-btn" onclick="speakActivePrompt()" class="p-2.5 rounded-full bg-white/5 text-cyan-400 hover:bg-cyan-500/10 transition-all border border-cyan-400/20" title="Audio Synthesizer Readout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                </button>
                <div class="text-xs font-bold text-[#7f999c] uppercase tracking-widest flex items-center gap-2" id="bottom-status">
                    <span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> Sync Ready
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let assessmentState = {};
    let activePhaseData = null;
    let swipeLogs = [];
    let swipeCards = [];
    let activeSwipeIndex = 0;
    
    // Voice synthesizers
    let speechSynth = window.speechSynthesis;
    let activeUtterance = null;

    document.addEventListener("DOMContentLoaded", async () => {
        await refreshState();
    });

    async function refreshState() {
        showLoader("Retrieving pipeline states...");
        try {
            const res = await fetch("/assessment/api/state");
            const data = await res.json();
            if (data.status === "success") {
                assessmentState = data;
                updateHeader();
                await loadPhase();
            } else {
                window.location.href = "/dashboard";
            }
        } catch (e) {
            console.error("Critical: Failed to resolve phase nodes", e);
            hideLoader();
        }
    }

    function showLoader(text = "Processing...") {
        document.getElementById("loader-text").innerText = text;
        const loader = document.getElementById("loader");
        loader.style.opacity = "1";
        loader.style.pointerEvents = "auto";
        loader.classList.remove("hidden");
    }

    function hideLoader() {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        loader.style.pointerEvents = "none";
        setTimeout(() => loader.classList.add("hidden"), 300);
    }

    function updateHeader() {
        const isG12 = assessmentState.student_type === "12th";
        // G12 has 6 phases (0 to 5), G10 has 5 phases (1 to 5)
        const totalPhases = isG12 ? 6 : 5;
        const currentLabelVal = isG12 ? (assessmentState.current_phase + 1) : assessmentState.current_phase;
        
        document.getElementById("grade-title").innerText = isG12 ? "Grade 12 Career Track" : "Grade 10 Stream Planner";
        document.getElementById("phase-step-label").innerText = `Phase ${currentLabelVal} of ${totalPhases}`;
        
        // Progress percentage calculation
        const percent = Math.round((currentLabelVal / totalPhases) * 100);
        document.getElementById("global-progress-fill").style.width = `${percent}%`;
        
        document.getElementById("subtitle-tracker").innerText = isG12 ? "Advanced Multi-Phase Diagnostic Flow" : "Interactive Stream Strategy Matrix";
    }

    async function loadPhase() {
        const phase = assessmentState.current_phase;
        
        if (speechSynth.speaking) speechSynth.cancel();

        try {
            const res = await fetch("/assessment/api/questions");
            activePhaseData = await res.json();
            
            const body = document.getElementById("phase-body");
            body.innerHTML = "";

            if (phase === 0) {
                renderIntakePhase();
            } else if (phase === 1) {
                renderSwipePhase();
            } else if (phase === 2) {
                renderChatPhase();
            } else if (phase === 3) {
                renderProxyPhase();
            } else if (phase === 4) {
                renderScenariosPhase();
            } else if (phase === 5) {
                renderCompilePhase();
            }
            hideLoader();
        } catch (e) {
            console.error("Critical failure during question load state", e);
            hideLoader();
        }
    }

    function speakActivePrompt() {
        if (speechSynth.speaking) {
            speechSynth.cancel();
            return;
        }
        
        let text = "";
        const phase = assessmentState.current_phase;
        
        if (phase === 0) {
            const lastAI = document.querySelector(".chat-bubble.ai:last-child");
            if (lastAI) text = lastAI.innerText;
        } else if (phase === 1) {
            const activeCard = swipeCards[activeSwipeIndex];
            if (activeCard) text = activeCard.content || activeCard.text || "";
        } else if (phase === 2) {
            const lastAI = document.querySelector(".chat-bubble.ai:last-child");
            if (lastAI) text = lastAI.innerText;
        } else {
            const pText = document.querySelector("#phase-body h2, #phase-body p");
            if (pText) text = pText.innerText;
        }

        if (text) {
            // strip console prefixes
            text = text.replace(/^SYS_PROMPT>\s*/, '');
            activeUtterance = new SpeechSynthesisUtterance(text);
            const voices = speechSynth.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith("en-IN")) || voices.find(v => v.lang.startsWith("en"));
            if (preferredVoice) activeUtterance.voice = preferredVoice;
            speechSynth.speak(activeUtterance);
        }
    }

    // --- PHASE 0: CLINICAL CONVERSATIONAL INTAKE (G12 ONLY) ---
    function renderIntakePhase() {
        const body = document.getElementById("phase-body");
        body.innerHTML = `
            <div class="text-center mb-6 stagger-in">
                <span class="cyber-badge mb-2">Phase 1: Intake Diagnostic</span>
                <h2 class="text-2xl font-bold mt-2 text-white">Student Metadata Profile</h2>
                <p class="text-[#7f999c] text-sm mt-1">We collect your academic configuration to anchor final results recommendations.</p>
            </div>

            <div class="border border-white/5 bg-black/40 rounded-2xl p-4 flex flex-col justify-between h-[360px] stagger-in">
                <div class="chat-container flex flex-col" id="intake-chat-box">
                    <!-- Dialogue nodes -->
                </div>
                
                <div class="flex gap-2 pt-3 border-t border-white/5 mt-2">
                    <input type="text" id="intake-input" placeholder="Supply requested detail..." class="flex-1 px-4 py-3 rounded-xl border border-white/10 focus:border-cyan-400 focus:outline-none text-sm font-medium bg-black/40 text-white" onkeydown="if(event.key === 'Enter') sendIntakeMessage()">
                    <button onclick="sendIntakeMessage()" id="intake-send-btn" class="px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-400 to-indigo-500 text-white font-extrabold hover:brightness-110 transition-all text-sm">Submit</button>
                </div>
            </div>
        `;
        
        // Initial intake message from Alex
        addIntakeBubble("Hello! I'm Alex, your career mentor. Let's start with your name. What's your name?", "ai");
    }

    function addIntakeBubble(text, role) {
        const box = document.getElementById("intake-chat-box");
        if (!box) return;
        const bubble = document.createElement("div");
        bubble.className = `chat-bubble console-bubble ${role === 'ai' ? 'ai mentor' : 'user'}`;
        bubble.innerText = role === 'ai' ? `SYS_PROMPT> ${text}` : `USR_INPUT> ${text}`;
        box.appendChild(bubble);
        box.scrollTop = box.scrollHeight;
    }

    async function sendIntakeMessage() {
        const input = document.getElementById("intake-input");
        const btn = document.getElementById("intake-send-btn");
        if (!input || !btn) return;
        const msg = input.value.trim();
        if (!msg) return;

        input.value = "";
        addIntakeBubble(msg, "user");

        input.disabled = true;
        btn.disabled = true;
        
        document.getElementById("bottom-status").innerHTML = `<span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> Querying extraction pipeline...`;

        try {
            const res = await fetch("/assessment/api/intake", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            
            document.getElementById("bottom-status").innerHTML = `<span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> Sync Ready`;
            
            if (data.status === "success") {
                addIntakeBubble(data.content, "ai");
                
                // Read AI voice synthesizer
                const speech = new SpeechSynthesisUtterance(data.content);
                const voices = speechSynth.getVoices();
                const preferredVoice = voices.find(v => v.lang.startsWith("en-IN")) || voices.find(v => v.lang.startsWith("en"));
                if (preferredVoice) speech.voice = preferredVoice;
                speechSynth.speak(speech);

                if (data.is_complete) {
                    setTimeout(async () => {
                        await refreshState();
                    }, 1800);
                } else {
                    input.disabled = false;
                    btn.disabled = false;
                    input.focus();
                }
            }
        } catch (e) {
            console.error(e);
            document.getElementById("bottom-status").innerHTML = `Extraction Error`;
            input.disabled = false;
            btn.disabled = false;
        }
    }

    // --- PHASE 1: REFLEX PREFERENCE CARD SWIPES (BOTH) ---
    function renderSwipePhase() {
        swipeCards = activePhaseData.cards || [];
        activeSwipeIndex = 0;
        swipeLogs = [];

        const body = document.getElementById("phase-body");
        body.innerHTML = `
            <div class="text-center mb-6 stagger-in">
                <span class="cyber-badge mb-2">Phase ${assessmentState.student_type === "12th" ? '2' : '1'}: Reflex Mapping</span>
                <h2 class="text-2xl font-bold mt-2 text-white">Preference Cards</h2>
                <p class="text-[#7f999c] text-sm mt-1">Swipe right for yes, left for no. Your response speed and hesitation coordinates are measured.</p>
            </div>
            
            <div class="deck-container stagger-in" id="card-deck">
                <!-- Glowing telemetry cards loaded dynamically -->
            </div>

            <div class="flex justify-center gap-6 mt-8 stagger-in">
                <button onclick="executeUiSwipe('left')" class="w-14 h-14 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-indigo-400 shadow-xl hover:bg-indigo-500/10 hover:border-indigo-400 hover:scale-105 active:scale-95 transition-all duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <button onclick="executeUiSwipe('right')" class="w-14 h-14 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-cyan-400 shadow-xl hover:bg-cyan-500/10 hover:border-cyan-400 hover:scale-105 active:scale-95 transition-all duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
            <div class="text-center mt-4 stagger-in">
                <span class="text-xs font-semibold text-[#7f999c]" id="swipe-counter">0 / 0 Completed</span>
            </div>
        `;
        buildSwipeCards();
    }

    let cardStartTime = Date.now();
    let isTransitioning = false;

    function buildSwipeCards() {
        const deck = document.getElementById("card-deck");
        if (!deck) return;
        deck.innerHTML = "";
        
        const total = swipeCards.length;
        document.getElementById("swipe-counter").innerText = `${activeSwipeIndex} / ${total} Cards Analyzed`;

        if (activeSwipeIndex >= total) {
            submitSwipeTelemetry();
            return;
        }

        const cardsToShow = swipeCards.slice(activeSwipeIndex, activeSwipeIndex + 3);
        
        cardsToShow.forEach((c, idx) => {
            const cardEl = document.createElement("div");
            cardEl.className = "swipe-card";
            
            const scale = 1 - idx * 0.05;
            const yOffset = idx * 18;
            cardEl.style.transform = `translateY(${yOffset}px) scale(${scale})`;
            cardEl.style.zIndex = 100 - idx;
            
            cardEl.innerHTML = `
                <div>
                    <span class="px-2.5 py-1 bg-white/5 text-cyan-400 border border-cyan-400/10 rounded-full text-[10px] font-bold tracking-widest uppercase">${c.category || 'OBJECTIVE'}</span>
                    <h3 class="text-xl font-bold mt-6 text-white leading-relaxed font-outfit">${c.content || c.text || ''}</h3>
                </div>
                <div class="flex justify-between items-center text-[10px] text-[#7f999c] font-bold tracking-wider pt-4 border-t border-white/5">
                    <span>← SWIPE LEFT (NO)</span>
                    <span>SWIPE RIGHT (YES) →</span>
                </div>
            `;
            deck.appendChild(cardEl);
            if (idx === 0) {
                setupDragInteraction(cardEl);
            }
        });
        
        cardStartTime = Date.now();
        isTransitioning = false;
    }

    function setupDragInteraction(el) {
        let startX = 0;
        let currentX = 0;
        
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: true});
        
        function start(e) {
            startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', end);
            document.addEventListener('touchmove', move, {passive: false});
            document.addEventListener('touchend', end);
        }
        
        function move(e) {
            currentX = (e.type === 'touchmove' ? e.touches[0].clientX : e.clientX) - startX;
            el.style.transform = `translateX(${currentX}px) rotate(${currentX / 16}deg)`;
            
            if (currentX > 50) {
                el.classList.add('swiping-right'); el.classList.remove('swiping-left');
            } else if (currentX < -50) {
                el.classList.add('swiping-left'); el.classList.remove('swiping-right');
            } else {
                el.classList.remove('swiping-right', 'swiping-left');
            }
        }
        
        async function end() {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', end);
            document.removeEventListener('touchmove', move);
            document.removeEventListener('touchend', end);
            
            if (Math.abs(currentX) > 120) {
                const direction = currentX > 0 ? 'right' : 'left';
                handleSwipeTelemetry(direction);
            } else {
                el.style.transform = '';
                el.classList.remove('swiping-right', 'swiping-left');
            }
        }
    }

    function executeUiSwipe(direction) {
        if (isTransitioning) return;
        isTransitioning = true;

        const deck = document.getElementById("card-deck");
        const topCard = deck.querySelector(".swipe-card");
        if (!topCard) return;

        topCard.classList.add(direction === "right" ? "swiped-right" : "swiped-left");
        
        setTimeout(() => {
            handleSwipeTelemetry(direction);
        }, 200);
    }

    function handleSwipeTelemetry(direction) {
        const endTime = Date.now();
        const duration = endTime - cardStartTime;
        const activeCard = swipeCards[activeSwipeIndex];

        swipeLogs.push({
            card_id: activeCard.id,
            direction: direction,
            reaction_ms: Math.round(duration * 0.45),
            dwell_ms: duration,
            hesitation_ms: duration > 2000 ? Math.round((duration - 1000) * 0.75) : 0
        });

        activeSwipeIndex++;
        buildSwipeCards();
    }

    async function submitSwipeTelemetry() {
        showLoader("Syncing biometric preferences...");
        try {
            const res = await fetch("/assessment/api/swipe", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ swipes: swipeLogs })
            });
            const data = await res.json();
            if (data.status === "success") {
                await refreshState();
            }
        } catch (e) {
            console.error(e);
            hideLoader();
        }
    }

    async function renderChatPhase() {
        const body = document.getElementById("phase-body");
        body.innerHTML = `

                <span class="cyber-badge mb-2">Phase ${assessmentState.student_type === "12th" ? '3' : '2'}: Mentorship Verification</span>
                <h2 class="text-2xl font-bold mt-2 text-white">Alex RIASEC Chat</h2>
                <p class="text-[#7f999c] text-sm mt-1">Answer short prompts as Alex drills into your intrinsic task orientations.</p>
            </div>

            <div class="border border-white/5 bg-black/40 rounded-2xl p-4 flex flex-col justify-between h-[360px] stagger-in">
                <div class="chat-container flex flex-col" id="chat-messages-box">
                    <!-- Conversations -->
                </div>
                
                <div class="flex gap-2 pt-3 border-t border-white/5 mt-2">
                    <input type="text" id="chat-input" placeholder="Speak your mind to Alex..." class="flex-1 px-4 py-3 rounded-xl border border-white/10 focus:border-cyan-400 focus:outline-none text-sm font-medium bg-black/40 text-white" onkeydown="if(event.key === 'Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()" id="chat-send-btn" class="px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-400 to-indigo-500 text-white font-extrabold hover:brightness-110 transition-all text-sm">Send</button>
                </div>
            </div>
        `;

        const hist = activePhaseData.chat_messages || [];
        if (hist.length === 0) {
            await sendChatMessage(true);
        } else {
            renderChatHistory(hist);
        }
    }

    function renderChatHistory(hist) {
        const box = document.getElementById("chat-messages-box");
        if (!box) return;
        box.innerHTML = "";
        hist.forEach(m => {
            const bubble = document.createElement("div");
            bubble.className = `chat-bubble ${m.role === 'ai' ? 'mentor' : 'user'}`;
            bubble.innerText = m.content;
            box.appendChild(bubble);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendChatMessage(isInit = false) {
        const input = document.getElementById("chat-input");
        const btn = document.getElementById("chat-send-btn");
        const msg = isInit ? "" : input.value.trim();
        if (!isInit && !msg) return;

        if (input) input.value = "";
        
        if (!isInit) {
            const box = document.getElementById("chat-messages-box");
            const bubble = document.createElement("div");
            bubble.className = "chat-bubble user";
            bubble.innerText = msg;
            box.appendChild(bubble);
            box.scrollTop = box.scrollHeight;

            if (input) input.disabled = true;
            if (btn) btn.disabled = true;
        }

        document.getElementById("bottom-status").innerHTML = `<span class="h-2 w-2 rounded-full bg-purple-400 animate-ping"></span> Alex is writing...`;

        try {
            const res = await fetch("/assessment/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            document.getElementById("bottom-status").innerHTML = `<span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> Sync Ready`;
            
            if (data.status === "success") {
                if (data.phase_complete) {
                    await refreshState();
                } else {
                    const box = document.getElementById("chat-messages-box");
                    const aiBubble = document.createElement("div");
                    aiBubble.className = "chat-bubble mentor";
                    aiBubble.innerText = data.message;
                    box.appendChild(aiBubble);
                    box.scrollTop = box.scrollHeight;
                    
                    const speech = new SpeechSynthesisUtterance(data.message);
                    const voices = speechSynth.getVoices();
                    const preferredVoice = voices.find(v => v.lang.startsWith("en-IN")) || voices.find(v => v.lang.startsWith("en"));
                    if (preferredVoice) speech.voice = preferredVoice;
                    speechSynth.speak(speech);

                    if (input) input.disabled = false;
                    if (btn) btn.disabled = false;
                    if (input) input.focus();
                }
            }
        } catch (e) {
            console.error(e);
            document.getElementById("bottom-status").innerHTML = `Connection Error`;
            if (input) input.disabled = false;
            if (btn) btn.disabled = false;
        }
    }

    async function compileFinalResults() {
        const btn = document.getElementById("compile-btn");
        const ind = document.getElementById("compiling-indicator");
        if (btn) btn.disabled = true;
        if (btn) btn.classList.add("opacity-40", "cursor-not-allowed");
        if (ind) ind.classList.remove("hidden");
        
        try {
            const res = await fetch("/assessment/api/compile", {
                method: "POST",
                headers: { "Content-Type": "application/json" }
            });
            const data = await res.json();
            if (data.status === "success") {
                window.location.href = data.redirect;
            } else {
                alert("Compilation failed. Please try resetting assessment progress.");
