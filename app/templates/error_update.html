<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll Be Right Back | CareStance</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e48',
                        },
                        accent: {
                            light: '#0b3b3c',
                            dark: '#1b5e5f',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 3s ease-in-out infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans bg-[#f8fafc] text-slate-800 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden select-none">

    <!-- Premium Background Gradient Effects -->
    <div class="absolute -top-40 -left-40 w-80 h-80 bg-primary-100/40 blur-[120px] rounded-full animate-pulse-slow"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-primary-100/50 blur-[140px] rounded-full animate-pulse-slow" style="animation-delay: 2s;"></div>

    <div class="max-w-xl w-full text-center relative z-10 glass-card p-10 md:p-14 rounded-[40px] border border-white shadow-2xl shadow-primary-100/30 flex flex-col items-center gap-8">
        
        <!-- Illustration/Icon Section with Vibrant Color and Motion -->
        <div class="relative group">
            <div class="absolute inset-0 bg-primary-600/20 blur-3xl rounded-full scale-110 group-hover:scale-125 transition-transform duration-500 animate-pulse-slow"></div>
            <div class="w-24 h-24 md:w-28 md:h-28 bg-gradient-to-tr from-primary-700 to-primary-600 text-white rounded-3xl flex items-center justify-center shadow-2xl shadow-primary-600/30 rotate-3 group-hover:rotate-6 transition-all duration-500 hover:-translate-y-2 animate-bounce-subtle relative border border-white/20">
                <i class="fas fa-tools text-4xl md:text-5xl"></i>
            </div>
        </div>

        <!-- Status & Heading -->
        <div class="space-y-3">
            <span class="text-xs bg-primary-50 text-primary-700 font-extrabold uppercase tracking-wider px-4 py-1.5 rounded-full border border-primary-100 inline-block shadow-sm">
                System Status: Updating
            </span>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-none bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-800">
                Under Maintenance
            </h1>
            <p class="text-slate-500 text-base md:text-lg max-w-sm mx-auto leading-relaxed font-medium">
                We're currently making some improvements. CareStance is going under update and will get fixed soon.
            </p>
            {% if error %}
            <div class="mt-4 p-4 bg-red-50 border border-red-100 rounded-2xl text-left">
                <p class="text-xs font-bold text-red-500 uppercase tracking-wider mb-1">Error Details:</p>
                <code class="text-xs text-red-700 font-mono break-all">{{ error }}</code>
            </div>
            {% endif %}
        </div>

        <!-- Call to Actions -->
        <div class="flex flex-col sm:flex-row items-center gap-4 w-full mt-2">
            <a href="/" class="w-full sm:flex-1 bg-gradient-to-r from-primary-800 to-primary-700 text-white font-extrabold text-sm px-6 py-4 rounded-2xl hover:from-primary-900 hover:to-primary-800 hover:shadow-xl hover:shadow-primary-600/20 hover:-translate-y-1 transition-all duration-300 shadow-lg shadow-primary-700/10 flex items-center justify-center gap-3 border border-white/10 group">
                <i class="fas fa-home text-base group-hover:scale-110 transition-transform"></i>
                Go To Home Page
            </a>
            <button onclick="window.location.reload();" class="w-full sm:flex-1 bg-white border border-slate-200 text-slate-600 font-extrabold text-sm px-6 py-4 rounded-2xl hover:bg-slate-50 hover:text-primary-800 hover:border-primary-100 hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-3">
                <i class="fas fa-redo-alt text-sm"></i>
                Refresh Page
            </button>
        </div>

        <!-- Simple Footer/Sign-off -->
        <p class="text-xs font-bold text-slate-400 mt-2">
            Thank you for your patience! &mdash; The CareStance Team
        </p>
    </div>

</body>
</html>
