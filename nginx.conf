events {
    worker_connections 1024;
}

http {
    upstream app_servers {
        # 'app' is the service name defined in docker-compose.yml
        # Docker DNS will resolve this to the IP addresses of the scaled containers
        server app:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional: Handle static files directly through Nginx for better performance
        # location /static/ {
        #     alias /app/app/static/;
        # }
    }
}
